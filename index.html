<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modbus Expert | Consola Profesional</title>
    <style>
        :root {
            --bg: #0a0a0c; --side: #121214; --panel: #18181b;
            --primary: #3b82f6; --primary-hover: #2563eb;
            --text: #e4e4e7; --muted: #71717a; --border: #27272a;
            --success: #10b981; --error: #ef4444; --warning: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Toolbar Superior */
        .toolbar { 
            height: 48px; background: var(--side); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }
        .logo { font-weight: 800; font-size: 0.9rem; letter-spacing: 0.5px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .conn-status { font-size: 0.7rem; display: flex; align-items: center; gap: 6px; color: var(--muted); }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--error); }
        .dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }

        /* Main Layout */
        .app-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar Izquierda (Estaciones) */
        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .section-title { padding: 15px 20px 10px; font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .station-list { flex: 1; overflow-y: auto; padding: 0 10px; }
        .station-item { 
            padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px;
            transition: 0.2s; border: 1px solid transparent;
        }
        .station-item:hover { background: #1e1e22; }
        .station-item.active { background: #1e1e22; border-color: var(--primary); }
        .station-name { font-size: 0.85rem; font-weight: 600; display: block; }
        .station-ip { font-size: 0.7rem; color: var(--muted); }

        /* Panel Central (Parámetros) */
        .editor-panel { width: 380px; background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }
        .group { margin-bottom: 20px; }
        .group-title { font-size: 0.75rem; font-weight: 600; margin-bottom: 12px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.65rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }
        input, select, textarea { 
            background: #121214; border: 1px solid var(--border); color: white; padding: 8px 12px;
            border-radius: 4px; font-size: 0.85rem; outline: none; transition: border 0.2s;
        }
        input:focus { border-color: var(--primary); }
        textarea { font-family: monospace; resize: none; }
        
        .btn { 
            padding: 10px; border-radius: 4px; border: none; cursor: pointer; font-weight: 700; 
            font-size: 0.8rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
        .btn-ghost:hover { background: #1e1e22; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Monitor Derecho */
        .monitor-panel { flex: 1; display: flex; flex-direction: column; background: #050505; }
        .monitor-header { height: 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; }
        .log-view { flex: 1; overflow-y: auto; padding: 15px; font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 0.75rem; line-height: 1.5; }
        
        /* Log Entries */
        .entry { margin-bottom: 15px; border-left: 2px solid #27272a; padding-left: 12px; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .entry-header { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; }
        .lvl { font-weight: 800; font-size: 0.65rem; padding: 1px 5px; border-radius: 3px; }
        .lvl-INFO { background: #064e3b; color: #10b981; }
        .lvl-DEBUG { background: #1e1b4b; color: #818cf8; }
        .lvl-ERROR { background: #450a0a; color: #f87171; }
        .ts { color: #52525b; }
        .dur { color: var(--warning); font-weight: bold; }
        
        .hex-box { background: #0f0f11; padding: 8px; border-radius: 4px; border: 1px solid #1e1e22; margin: 5px 0; color: #94a3b8; word-break: break-all; }
        .data-viewer { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 8px; }
        .val-card { background: #121214; border: 1px solid var(--border); padding: 8px; border-radius: 4px; }
        .val-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; display: block; }
        .val-num { font-size: 1rem; font-weight: 700; color: var(--text); }

        .loader { width: 12px; height: 12px; border: 2px solid #fff; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="logo">MODBUS MASTER EXPERT <span style="font-weight:300; color:var(--muted)">v2.0</span></div>
    <div class="conn-status">
        <div id="dot" class="dot"></div>
        <span id="wsLabel">SIN CONEXIÓN</span>
    </div>
</div>

<div class="app-container">
    <div class="sidebar">
        <div class="section-title">Estaciones Guardadas</div>
        <div id="stationList" class="station-list"></div>
        <div style="padding: 15px;">
            <button class="btn btn-ghost" style="width:100%" onclick="saveConfig()">Guardar YAML</button>
        </div>
    </div>

    <div class="editor-panel">
        <div class="group">
            <div class="group-title">PARÁMETROS DE CONEXIÓN</div>
            <div class="form-grid">
                <div class="field"><label>Dirección IP</label><input type="text" id="ip" value="10.50.184.208"></div>
                <div class="field"><label>Puerto TCP</label><input type="number" id="port" value="502"></div>
                <div class="field" style="grid-column: span 2;"><label>ID del Esclavo (Unit ID)</label><input type="number" id="sid" value="2"></div>
            </div>
        </div>

        <div class="group">
            <div class="group-title">PETICIÓN DE REGISTROS</div>
            <div class="form-grid">
                <div class="field" style="grid-column: span 2;">
                    <label>Función Modbus</label>
                    <select id="func">
                        <option value="3">03 Read Holding Registers</option>
                        <option value="4">04 Read Input Registers</option>
                    </select>
                </div>
                <div class="field"><label>Dirección Inicio</label><input type="number" id="addr" value="10000"></div>
                <div class="field"><label>Cantidad (Reg)</label><input type="number" id="qty" value="2"></div>
            </div>
        </div>

        <div class="group">
            <div class="group-title">INTERPRETACIÓN</div>
            <div class="form-grid">
                <div class="field" style="grid-column: span 2;">
                    <label>Formato de Datos</label>
                    <select id="dtype">
                        <option value="float32">Float 32 (IEEE 754)</option>
                        <option value="int16">Entero 16 bits</option>
                    </select>
                </div>
                <div class="field" style="grid-column: span 2;">
                    <label>Orden de Bytes (Endianness)</label>
                    <select id="endian">
                        <option value="dcba">Little Endian / DCBA (Swapped)</option>
                        <option value="cdab">Word Swap / CDAB</option>
                        <option value="abcd">Big Endian / ABCD</option>
                        <option value="badc">Byte Swap / BADC</option>
                    </select>
                </div>
            </div>
        </div>

        <button id="readBtn" class="btn btn-primary" onclick="doRead()">
            <span>REALIZAR LECTURA</span>
            <div id="loader" class="loader" style="display:none"></div>
        </button>

        <div class="group" style="margin-top:25px;">
            <div class="group-title">INYECCIÓN RAW (HEX)</div>
            <textarea id="rawHex" rows="3" placeholder="Ej: 000100000006020327100002"></textarea>
            <button class="btn btn-ghost" style="width:100%; margin-top:8px;" onclick="sendRaw()">ENVIAR TRAMA MANUAL</button>
        </div>
    </div>

    <div class="monitor-panel">
        <div class="monitor-header">
            <div style="font-size:0.75rem; font-weight:700; color:var(--muted)">MONITOR DE TRÁFICO</div>
            <button class="btn btn-ghost" style="padding:4px 10px; font-size:0.65rem;" onclick="clearLogs()">Limpiar Consola</button>
        </div>
        <div id="logView" class="log-view"></div>
    </div>
</div>

<script>
    let globalConfig = { stations: [] };
    let isReading = false;

    async function init() {
        try {
            const res = await fetch('/api/config');
            globalConfig = await res.json();
            renderStations();
        } catch(e) {}
        setupWS();
    }

    function renderStations() {
        const container = document.getElementById('stationList');
        container.innerHTML = globalConfig.stations.map((st, i) => `
            <div class="station-item" onclick="loadStation(${i})">
                <span class="station-name">${st.name}</span>
                <span class="station-ip">${st.ip} (ID: ${st.id})</span>
            </div>
        `).join('');
    }

    function loadStation(i) {
        const st = globalConfig.stations[i];
        document.getElementById('ip').value = st.ip;
        document.getElementById('sid').value = st.id;
        document.getElementById('addr').value = st.start_addr || 10000;
        document.getElementById('qty').value = st.quantity || 2;
        document.getElementById('endian').value = st.endian || 'dcba';
        
        document.querySelectorAll('.station-item').forEach((el, idx) => {
            el.classList.toggle('active', idx === i);
        });
    }

    async function doRead() {
        if (isReading) return;
        setLoading(true);
        const payload = {
            ip: document.getElementById('ip').value,
            port: parseInt(document.getElementById('port').value),
            id: parseInt(document.getElementById('sid').value),
            addr: parseInt(document.getElementById('addr').value),
            count: parseInt(document.getElementById('qty').value),
            endian: document.getElementById('endian').value
        };
        try {
            await fetch('/api/test', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        } catch(e) {}
        setLoading(false);
    }

    function setLoading(val) {
        isReading = val;
        document.getElementById('loader').style.display = val ? 'inline-block' : 'none';
        document.getElementById('readBtn').disabled = val;
    }

    async function sendRaw() {
        const hex = document.getElementById('rawHex').value.replace(/\s/g, '');
        if (!hex) return;
        await fetch('/api/raw', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ ip: document.getElementById('ip').value, port: parseInt(document.getElementById('port').value), hex: hex }) 
        });
    }

    async function saveConfig() {
        await fetch('/api/config', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(globalConfig) });
        alert('Configuración YAML actualizada correctamente.');
    }

    function setupWS() {
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        const dot = document.getElementById('dot');
        const label = document.getElementById('wsLabel');
        ws.onopen = () => { dot.classList.add('active'); label.innerText = 'CONECTADO'; };
        ws.onclose = () => { dot.classList.remove('active'); label.innerText = 'DESCONECTADO'; setTimeout(setupWS, 2000); };
        ws.onmessage = (e) => addLog(JSON.parse(e.data));
    }

    function addLog(l) {
        const view = document.getElementById('logView');
        const div = document.createElement('div');
        div.className = 'entry';
        
        let decodeContent = '';
        if (l.raw_hex) {
            decodeContent = `
                <div class="hex-box">${l.raw_hex.match(/.{1,2}/g).join(' ')}</div>
                <div class="data-viewer">${decodeData(l.raw_hex)}</div>
            `;
        }

        div.innerHTML = `
            <div class="entry-header">
                <span class="lvl lvl-${l.level}">${l.level}</span>
                <span class="ts">${l.timestamp}</span>
                <span style="font-weight:600">${l.message}</span>
                ${l.duration ? `<span class="dur">${l.duration}</span>` : ''}
            </div>
            ${decodeContent}
        `;
        view.appendChild(div);
        view.scrollTop = view.scrollHeight;
    }

    function decodeData(hex) {
        if (hex.length < 18) return '';
        const unit = hex.substring(12,14);
        const func = hex.substring(14,16);
        const data = hex.substring(18);
        
        let res = `<div class="val-card"><span class="val-label">ID / Función</span><span class="val-num">${unit} / ${func}</span></div>`;

        if (data.length === 8) {
            const b = []; for(let i=0; i<8; i+=2) b.push(parseInt(data.substr(i,2), 16));
            const endian = document.getElementById('endian').value;
            let val = 0;
            
            // Lógica de decodificación IEEE 754
            if (endian === 'dcba') val = hexToFloat((b[3] << 24) | (b[2] << 16) | (b[1] << 8) | b[0]);
            else if (endian === 'cdab') val = hexToFloat((b[2] << 24) | (b[3] << 16) | (b[0] << 8) | b[1]);
            else if (endian === 'badc') val = hexToFloat((b[1] << 24) | (b[0] << 16) | (b[3] << 8) | b[2]);
            else val = hexToFloat((b[0] << 24) | (b[1] << 16) | (b[2] << 8) | b[3]);

            res += `<div class="val-card" style="border-left-color:var(--success)"><span class="val-label">Float 32 (${endian.toUpperCase()})</span><span class="val-num">${val.toFixed(5)}</span></div>`;
        } else if (data.length > 0) {
            res += `<div class="val-card" style="grid-column: span 2"><span class="val-label">Bytes de Datos (RAW)</span><span class="val-num" style="font-size:0.7rem">${data}</span></div>`;
        }
        return res;
    }

    function hexToFloat(hexInt) {
        const buf = new ArrayBuffer(4);
        (new DataView(buf)).setUint32(0, hexInt >>> 0, false);
        return (new DataView(buf)).getFloat32(0, false);
    }

    function clearLogs() { document.getElementById('logView').innerHTML = ''; }
    init();
</script>
</body>
</html>
