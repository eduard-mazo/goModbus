<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROC Master Expert | Dashboard Reactivo</title>
    <style>
        :root {
            --bg: #f8fafc; --panel: #ffffff; --primary: #3b82f6;
            --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
            --success: #10b981; --error: #ef4444; --accent: #f59e0b;
            /* Pastel Palette */
            --p-blue: #dbeafe; --p-green: #dcfce7; --p-red: #fee2e2;
            --p-yellow: #fef9c3; --p-purple: #f3e8ff;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .container { display: flex; gap: 20px; flex: 1; overflow: hidden; }
        
        .sidebar { flex: 0 0 400px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .main { flex: 1; display: flex; flex-direction: column; gap: 15px; overflow: hidden; }
        
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        h3 { margin: 0 0 15px 0; font-size: 0.8rem; text-transform: uppercase; color: var(--primary); letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field { margin-bottom: 10px; }
        label { display: block; font-size: 0.65rem; color: var(--muted); margin-bottom: 4px; font-weight: 700; text-transform: uppercase; }
        input, select { 
            width: 100%; background: #f1f5f9; border: 1px solid var(--border); color: var(--text); 
            padding: 10px; border-radius: 10px; font-size: 0.85rem; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); background: #fff; }
        
        .btn { cursor: pointer; border: none; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 0.8rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn:hover { filter: brightness(1.05); transform: translateY(-1px); }

        /* Monitor Moderno */
        .log-container { flex: 1; background: #fff; border-radius: 20px; border: 1px solid var(--border); overflow-y: auto; padding: 20px; }
        .log-entry { margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; }
        
        /* Pastel Badges */
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .badge-info { background: var(--p-blue); color: #1e40af; }
        .badge-success { background: var(--p-green); color: #166534; }
        .badge-error { background: var(--p-red); color: #991b1b; }

        .hex-stream { font-family: monospace; color: var(--muted); font-size: 0.7rem; background: #f8fafc; padding: 8px; border-radius: 8px; margin: 10px 0; border: 1px dashed var(--border); word-break: break-all; }
        
        /* Data Display */
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 10px; }
        .data-card { padding: 12px; border-radius: 15px; border: 1px solid var(--border); transition: 0.3s; }
        .data-card.special { background: var(--p-yellow); border-color: #fef08a; }
        .data-card.analog { background: var(--p-purple); border-color: #e9d5ff; }
        .d-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; font-weight: 800; }
        .d-value { font-size: 1.1rem; font-weight: 900; color: var(--text); margin-top: 2px; }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:15px;">
        <span style="font-size:1.4rem; font-weight:900; color:var(--primary); letter-spacing: -1px;">ROC MASTER EXPERT</span>
        <span id="wsStatus" class="badge badge-info">● Sincronizando</span>
    </div>
    <button class="btn btn-primary" style="background:var(--p-red); color:#991b1b;" onclick="document.getElementById('logView').innerHTML=''">Limpiar Monitor</button>
</div>

<div class="container">
    <div class="sidebar">
        <div class="card">
            <h3>Configuración ROC</h3>
            <div class="form-grid">
                <div class="field" style="grid-column: span 2;"><label>IP Dispositivo</label><input type="text" id="ip" value="10.50.184.208"></div>
                <div class="field"><label>Slave ID</label><input type="number" id="sid" value="10"></div>
                <div class="field"><label>Base Histórica</label><input type="number" id="dbAddr" value="700"></div>
            </div>
            
            <div class="form-grid" style="margin-top:10px; border-top:1px solid #f1f5f9; padding-top:10px;">
                <div class="field"><label>Puntero @</label><input type="number" id="ptrAddr" value="10000"></div>
                <div class="field"><label>Puntero Qty</label><input type="number" id="ptrQty" value="2"></div>
                <div class="field"><label>Puntero Endian</label>
                    <select id="ptrEndian" onchange="forceReactive()">
                        <option value="cdab">Word Swap</option>
                        <option value="dcba">Little Endian</option>
                        <option value="abcd">Big Endian</option>
                    </select>
                </div>
                <div class="field"><label>Hist. Endian</label>
                    <select id="dbEndian" onchange="forceReactive()">
                        <option value="cdab">Word Swap</option>
                        <option value="dcba">Little Endian</option>
                        <option value="abcd">Big Endian</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Operaciones</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn btn-primary" onclick="executeAction('ptr')">Leer Puntero</button>
                <button class="btn btn-primary" onclick="executeAction('hist')">Leer Histórico</button>
            </div>
            <button class="btn btn-success" style="width:100%; margin-top:10px;" onclick="executeAction('full')">Flujo Completo ROC ➜</button>
            <div class="field" style="margin-top:15px;">
                <label>Último Puntero / Valor Manual</label>
                <input type="number" id="manualPtr" placeholder="Puntero...">
            </div>
        </div>

        <div class="card" id="stationList">
            <h3>Estaciones Guardadas</h3>
        </div>
    </div>

    <div class="main">
        <div class="card" style="flex: 1; display: flex; flex-direction: column;">
            <h3>Monitor ROC (Reactivo)</h3>
            <div id="logView" class="log-container"></div>
        </div>
    </div>
</div>

<script>
    let stations = [];
    let logsData = [];

    async function init() {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        stations = cfg.stations;
        renderStationList();
        setupWS();
    }

    function renderStationList() {
        document.getElementById('stationList').innerHTML += stations.map((st, i) => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-radius:12px; background:#f8fafc; margin-bottom:8px; border:1px solid #e2e8f0;">
                <span style="font-size:0.8rem; font-weight:700;">${st.name}</span>
                <button class="btn btn-primary" style="padding:4px 10px; font-size:0.6rem;" onclick="loadStation(${i})">Cargar</button>
            </div>
        `).join('');
    }

    function loadStation(i) {
        const st = stations[i];
        document.getElementById('ip').value = st.ip;
        document.getElementById('sid').value = st.id;
        document.getElementById('ptrAddr').value = st.pointer_address;
        document.getElementById('ptrQty').value = st.data_registers_count;
        document.getElementById('dbAddr').value = st.db_address;
        document.getElementById('ptrEndian').value = st.pointer_endian;
        document.getElementById('dbEndian').value = st.db_endian;
    }

    async function executeAction(mode) {
        const payload = {
            ip: document.getElementById('ip').value, port: 502,
            id: parseInt(document.getElementById('sid').value),
            pointer_endian: document.getElementById('ptrEndian').value,
            pointer_address: parseInt(document.getElementById('ptrAddr').value),
            pointer_qty: parseInt(document.getElementById('ptrQty').value),
            db_endian: document.getElementById('dbEndian').value,
            db_address: parseInt(document.getElementById('dbAddr').value),
            mode: mode,
            manual_ptr: document.getElementById('manualPtr').value ? parseFloat(document.getElementById('manualPtr').value) : null
        };
        const res = await fetch('/api/test', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.pointer_val) document.getElementById('manualPtr').value = Math.floor(data.pointer_val);
    }

    function forceReactive() {
        const view = document.getElementById('logView');
        view.innerHTML = '';
        logsData.forEach(l => addLogEntry(l));
    }

    function setupWS() {
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        ws.onmessage = (e) => {
            const l = JSON.parse(e.data);
            logsData.unshift(l);
            if (logsData.length > 50) logsData.pop();
            addLogEntry(l);
        };
        ws.onopen = () => { document.getElementById('wsStatus').className = 'badge badge-success'; document.getElementById('wsStatus').innerText = '● En Línea'; };
        ws.onclose = () => { document.getElementById('wsStatus').className = 'badge badge-error'; document.getElementById('wsStatus').innerText = '● Desconectado'; setTimeout(setupWS, 2000); };
    }

    function addLogEntry(l) {
        const view = document.getElementById('logView');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const hex = l.raw_hex || "";
        
        entry.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; gap:10px; align-items:center;">
                    <span class="badge ${l.level === 'INFO' ? 'badge-success' : 'badge-error'}">${l.level}</span>
                    <span style="font-weight:800; font-size:0.8rem;">${l.message}</span>
                </div>
                <span style="color:var(--muted); font-size:0.7rem; font-weight:700;">${l.timestamp}</span>
            </div>
            ${hex ? `<div class="hex-stream">${hex.match(/.{1,2}/g).join(' ')}</div>` : ''}
            <div class="data-grid">${hex ? decodeReactive(hex) : ''}</div>
        `;
        view.prepend(entry);
    }

    function decodeReactive(hex) {
        if (hex.length < 18) return '';
        const data = hex.substring(18);
        const endian = document.getElementById('dbEndian').value;
        const b = []; for(let i=0; i<data.length; i+=2) b.push(parseInt(data.substr(i,2), 16));
        
        let html = '';
        const floats = [];
        for (let i = 0; i+4 <= b.length; i += 4) {
            const s = b.slice(i, i+4);
            let val = 0;
            if (endian === 'dcba') val = hexToFloat((s[3] << 24) | (s[2] << 16) | (s[1] << 8) | s[0]);
            else if (endian === 'cdab') val = hexToFloat((s[2] << 24) | (s[3] << 16) | (s[0] << 8) | s[1]);
            else val = hexToFloat((s[0] << 24) | (s[1] << 16) | (s[2] << 8) | s[3]);
            floats.push(val);
        }

        if (floats.length >= 2) {
            html += `<div class="data-card special"><span class="d-label">FECHA (m/dd/yy)</span><span class="d-value">${parseROCDate(floats[0])}</span></div>`;
            html += `<div class="data-card special"><span class="d-label">HORA (MILITAR)</span><span class="d-value">${parseROCTime(floats[1])}</span></div>`;
            for(let i=2; i<floats.length; i++) {
                html += `<div class="data-card analog"><span class="d-label">ANÁLOGO ${i-1}</span><span class="d-value">${floats[i].toFixed(4)}</span></div>`;
            }
        } else if (floats.length === 1) {
            html += `<div class="data-card"><span class="d-label">Puntero/Valor</span><span class="d-value">${floats[0].toFixed(0)}</span></div>`;
        }
        return html;
    }

    function parseROCDate(val) {
        const s = Math.floor(val).toString();
        if (s.length < 5) return s;
        const y = s.slice(-2); const d = s.slice(-4, -2); const m = s.slice(0, s.length - 4);
        return `${m}/${d}/${y}`;
    }

    function parseROCTime(val) {
        const s = Math.floor(val).toString().padStart(4, '0');
        return `${s.slice(0,2)}:${s.slice(2,4)}`;
    }

    function hexToFloat(hexInt) {
        const buf = new ArrayBuffer(4); (new DataView(buf)).setUint32(0, hexInt >>> 0, false);
        return (new DataView(buf)).getFloat32(0, false);
    }

    init();
</script>
</body>
</html>
