<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modbus Master Analyzer (Standalone)</title>
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --primary: #38bdf8;
            --text: #f8fafc; --muted: #64748b; --error: #ef4444; --success: #22c55e;
            --border: #1e293b; --accent: #f59e0b; --code: #10b981;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 15px; overflow: hidden; height: 100vh;
        }
        .container { display: flex; gap: 15px; height: 100%; }
        .sidebar { flex: 0 0 380px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .panel { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 15px; overflow: hidden; }
        h3 { margin: 0 0 12px 0; color: var(--primary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .field-group { margin-bottom: 8px; }
        label { display: block; font-size: 0.65rem; color: var(--muted); margin-bottom: 2px; }
        input, select, textarea { 
            width: 100%; background: #020617; border: 1px solid var(--border); 
            color: white; padding: 8px; border-radius: 4px; font-size: 0.85rem; font-family: monospace;
        }
        .btn { cursor: pointer; border: none; padding: 8px; border-radius: 4px; font-weight: bold; width: 100%; font-size: 0.8rem; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #020617; }
        .btn-accent { background: var(--accent); color: #020617; }
        .btn-danger { background: #334155; color: var(--text); }
        .btn:hover { filter: brightness(1.1); }
        
        .log-view { 
            flex: 1; background: #000; border-radius: 8px; padding: 10px; 
            font-family: 'Fira Code', 'Consolas', monospace; font-size: 0.75rem; 
            overflow-y: auto; color: #cbd5e1; border: 1px solid var(--border);
        }
        .log-line { border-bottom: 1px solid #111; padding: 6px 0; }
        .time { color: #475569; font-size: 0.7rem; }
        .ERROR { color: var(--error); }
        .INFO { color: var(--success); }
        .DEBUG { color: var(--primary); }
        
        .parse-box { background: #020617; border: 1px solid #1e293b; padding: 10px; margin-top: 5px; border-radius: 4px; }
        .hex-raw { color: #94a3b8; font-size: 0.7rem; word-break: break-all; margin-bottom: 5px; display: block; background: #111; padding: 4px; border-radius: 2px; }
        .float-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
        .float-item { background: #1e293b; padding: 5px; border-radius: 3px; border-left: 3px solid var(--code); }
        .float-label { font-size: 0.6rem; color: var(--muted); display: block; }
        .float-val { color: var(--text); font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <!-- Inyector de Tramas RAW -->
        <div class="panel">
            <h3>Custom Hex Injector</h3>
            <div class="field-group"><label>Target Device IP</label><input type="text" id="rawIP" value="10.50.184.208"></div>
            <div class="field-group">
                <label>Hex Frame (Paste frame here)</label>
                <textarea id="rawHex" rows="3" placeholder="e.g. 000100000006020327100002" oninput="liveDecode(this.value)"></textarea>
            </div>
            <button class="btn btn-accent" onclick="sendRaw()">EXECUTE FRAME ➜</button>
            <div id="livePreview" style="margin-top:10px;"></div>
        </div>

        <div class="panel">
            <h3>Standard Request</h3>
            <div style="display: flex; gap: 8px;">
                <div class="field-group" style="flex: 2;"><label>Start Address</label><input type="number" id="mAddr" value="10000"></div>
                <div class="field-group" style="flex: 1;"><label>Qty</label><input type="number" id="mQty" value="2"></div>
            </div>
            <button class="btn btn-primary" onclick="manualRead()">READ REGISTERS</button>
        </div>

        <div class="panel" style="flex:1">
            <h3>Saved Stations</h3>
            <div id="stationList"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="panel" style="flex: 1; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3>Traffic Monitor & Protocol Decoder</h3>
                <button class="btn btn-danger" style="width: auto; padding: 4px 12px;" onclick="clearLogs()">Clear Console</button>
            </div>
            <div id="logView" class="log-view"></div>
            <div style="margin-top:10px; font-size:0.7rem; color:var(--muted); display:flex; justify-content:space-between; align-items:center;">
                <span id="wsStatus">● WS Disconnected</span>
                <span>Float32: CDAB (Swapped) | ABCD (Big) | DCBA (Little)</span>
            </div>
        </div>
    </div>
</div>

<script>
    async function init() {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        document.getElementById('stationList').innerHTML = cfg.stations.map((st, i) => `
            <div style="margin-bottom:8px; display:flex; gap:5px; align-items:center; background:#1e293b; padding:8px; border-radius:6px;">
                <div style="flex:1"><span style="font-size:0.75rem; font-weight:bold;">${st.name}</span><br><span style="font-size:0.65rem; color:var(--muted)">${st.ip} (ID:${st.id})</span></div>
                <button class="btn btn-primary" style="width:30px" onclick="setRawTarget('${st.ip}', ${st.id})">➜</button>
            </div>
        `).join('');
        setupWebSocket();
    }

    function setRawTarget(ip, id) {
        document.getElementById('rawIP').value = ip;
        // Auto-generate a basic read request for that ID
        const trans = "0001";
        const proto = "0000";
        const len = "0006";
        const unit = id.toString(16).padStart(2, '0');
        const func = "03";
        const addr = "2710"; // 10000
        const qty = "0002";
        document.getElementById('rawHex').value = trans + proto + len + unit + func + addr + qty;
        liveDecode(document.getElementById('rawHex').value);
    }

    async function sendRaw() {
        const hex = document.getElementById('rawHex').value.replace(/\s/g, '');
        const ip = document.getElementById('rawIP').value;
        await fetch('/api/raw', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ip, port:502, hex})
        });
    }

    async function manualRead() {
        const ip = document.getElementById('rawIP').value;
        const addr = parseInt(document.getElementById('mAddr').value);
        const qty = parseInt(document.getElementById('mQty').value);
        await fetch('/api/test', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ip, port:502, id:2, addr, count:qty, endian:'little'})
        });
    }

    function liveDecode(hex) {
        const preview = document.getElementById('livePreview');
        if (hex.length < 4) { preview.innerHTML = ''; return; }
        preview.innerHTML = `<div class="parse-box" style="font-size:0.7rem; border-color:var(--accent);">
            <div style="color:var(--accent); margin-bottom:5px; font-weight:bold;">Offline Decoder:</div>
            ${decodeModbus(hex.replace(/\s/g, ''))}
        </div>`;
    }

    function setupWebSocket() {
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        ws.onopen = () => { document.getElementById('wsStatus').innerText = '● WS Connected'; document.getElementById('wsStatus').style.color='#22c55e'; };
        ws.onclose = () => { document.getElementById('wsStatus').innerText = '● WS Reconnecting...'; document.getElementById('wsStatus').style.color='#ef4444'; setTimeout(setupWebSocket, 2000); };
        ws.onmessage = (e) => addLog(JSON.parse(e.data));
    }

    function addLog(l) {
        const view = document.getElementById('logView');
        const entry = document.createElement('div');
        entry.className = 'log-line';
        entry.innerHTML = `
            <div style="display:flex; justify-content:space-between">
                <div><span class="time">[${l.timestamp}]</span> <span class="${l.level}">${l.level}:</span> ${l.message}</div>
            </div>
            ${l.raw_hex ? `
                <div class="parse-box">
                    <span class="hex-raw">RAW HEX: ${l.raw_hex}</span>
                    ${decodeModbus(l.raw_hex)}
                </div>
            ` : ''}
        `;
        view.appendChild(entry);
        view.scrollTop = view.scrollHeight;
    }

    function decodeModbus(hex) {
        if (hex.length < 14) return `<span class="ERROR">Frame too short</span>`;
        const unit = hex.substring(12,14);
        const func = hex.substring(14,16);
        let res = `<div><b>Unit:</b> ${unit} | <b>Func:</b> ${func}</div>`;
        
        if (func === "83") {
            return res + `<div class="ERROR">MODBUS EXCEPTION: ${hex.substring(16,18)}</div>`;
        }
        
        if (hex.length >= 18) {
            const data = hex.substring(18);
            if (data.length === 8) {
                const b = [];
                for(let i=0; i<8; i+=2) b.push(parseInt(data.substr(i,2), 16));
                const cdab = hexToFloat((b[2] << 24) | (b[3] << 16) | (b[0] << 8) | b[1]);
                const abcd = hexToFloat((b[0] << 24) | (b[1] << 16) | (b[2] << 8) | b[3]);
                const dcba = hexToFloat((b[3] << 24) | (b[2] << 16) | (b[1] << 8) | b[0]);
                res += `<div class="float-grid">
                    <div class="float-item"><span class="float-label">CDAB (Swapped)</span><span class="float-val">${cdab.toFixed(5)}</span></div>
                    <div class="float-item"><span class="float-label">ABCD (Big)</span><span class="float-val">${abcd.toFixed(5)}</span></div>
                    <div class="float-item"><span class="float-label">DCBA (Little)</span><span class="float-val">${dcba.toFixed(5)}</span></div>
                </div>`;
            } else {
                res += `<div style="color:var(--code); margin-top:5px; word-break:break-all;"><b>Data:</b> ${data}</div>`;
            }
        }
        return res;
    }

    function hexToFloat(hexInt) {
        const buf = new ArrayBuffer(4);
        (new DataView(buf)).setUint32(0, hexInt, false);
        return (new DataView(buf)).getFloat32(0, false);
    }

    function clearLogs() { document.getElementById('logView').innerHTML = '<div class="log-line" style="color:var(--muted)">Console cleared.</div>'; }
    init();
</script>
</body>
</html>
